<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Pinterest Clone - Home</title>

    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>

<body>
    <header>
        <div class="logo">
            <i class="fa-brands fa-pinterest"></i>
            <span>Pinterest</span>
        </div>
        <div class="search-box">
            <input type="text" placeholder="Search Pinterest">
        </div>
        <nav class="nav-buttons">

            <a href="signin.html" class="login-btn">
                Log in
            </a>

            <a href="signin.html" class="signup-btn">
                Sign up
            </a>

        </nav>
        <div class="icons">

            <i class="fa-solid fa-bell"></i>

            <i class="fa-solid fa-message"></i>

            <i class="fa-solid fa-user"></i>

        </div>

    </header>

    <section class="gallery">

        <div class="card">
            <a href="signin.html">
                <img src="img1.jpg" alt="Image 1">
            </a>
        </div>

        <div class="card">
            <a href="signin.html">
                <img src="img2.jpg" alt="Image 2">
            </a>
        </div>

        <div class="card">
            <a href="signin.html">
                <img src="img3.jpg" alt="Image 3">
            </a>
        </div>

        <div class="card">
            <a href="signin.html">
                <img src="img4.jpg" alt="Image 4">
            </a>
        </div>

        <div class="card">
            <a href="signin.html">
                <img src="img5.jpg" alt="Image 5">
            </a>
        </div>

        <div class="card">
            <a href="signin.html">
                <img src="img6.jpg" alt="Image 6">
            </a>
        </div>

        <div class="card">
            <a href="signin.html">
                <img src="img7.jpg" alt="Image 7">
            </a>
        </div>

        <div class="card">
            <a href="signin.html">
                <img src="img8.jpg" alt="Image 8">
            </a>
        </div>

        <div class="card">
            <a href="signin.html">
                <img src="img9.jpg" alt="Image 9">
            </a>
        </div>

        <div class="card">
            <a href="signin.html">
                <img src="img10.jpg" alt="Image 10">
            </a>
        </div>

    </section>

</body>

</html>

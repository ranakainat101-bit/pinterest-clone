<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pinterest - Profile</title>

    <link rel="stylesheet" href="profile.css">

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>

<body>

<header>

    <div class="logo">
        <i class="fa-brands fa-pinterest"></i>
        <span>Pinterest</span>
    </div>

    <div class="search-box">
        <input type="text" placeholder="Search Pins">
    </div>

    <div class="icons">
        <i class="fa-solid fa-house"></i>
        <i class="fa-solid fa-bell"></i>
        <i class="fa-solid fa-message"></i>
        <i class="fa-solid fa-user"></i>
    </div>

</header>

<section class="profile">

    <img src="img1.jpg" alt="Profile Picture" class="profile-pic">

    <h1>Rana Kainat</h1>

    <p class="username">@rana_kainat</p>

    <div class="stats">

        <div>
            <h2>120</h2>
            <span>Followers</span>
        </div>

        <div>
            <h2>85</h2>
            <span>Following</span>
        </div>

        <div>
            <h2>42</h2>
            <span>Pins</span>
        </div>

    </div>

    <div class="buttons">

        <button>Edit Profile</button>

        <button>Share</button>

    </div>

</section>

<section class="gallery">
        <div class="card">
        <img src="img1.jpg" alt="Pin 1">
    </div>

    <div class="card">
        <img src="img2.jpg" alt="Pin 2">
    </div>

    <div class="card">
        <img src="img3.jpg" alt="Pin 3">
    </div>

    <div class="card">
        <img src="img4.jpg" alt="Pin 4">
    </div>

    <div class="card">
        <img src="img5.jpg" alt="Pin 5">
    </div>

    <div class="card">
        <img src="img6.jpg" alt="Pin 6">
    </div>

    <div class="card">
        <img src="img7.jpg" alt="Pin 7">
    </div>

    <div class="card">
        <img src="img8.jpg" alt="Pin 8">
    </div>

    <div class="card">
        <img src="img9.jpg" alt="Pin 9">
    </div>

    <div class="card">
        <img src="img10.jpg" alt="Pin 10">
    </div>

</section>

</body>
</html>
